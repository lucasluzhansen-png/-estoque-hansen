<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estoque Hansen Odontologia</title>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#242736;--border:#2e3347;--text:#e8eaf0;--muted:#6b7280;--accent:#4f9cf9;--danger:#f05252;--warning:#f59e0b;--ok:#10b981;--r:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.logo{font-weight:700;font-size:17px}.logo span{color:var(--accent)}
.stats{display:flex;gap:20px}
.stat-n{font-size:22px;font-weight:700;line-height:1}.stat-n.danger{color:var(--danger)}.stat-n.ok{color:var(--ok)}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px}
.tabs{display:flex;gap:2px;padding:14px 24px 0;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto}
.tab{padding:8px 16px;border-radius:var(--r) var(--r) 0 0;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border:1px solid transparent;border-bottom:none;white-space:nowrap;transition:all .15s}
.tab.active{background:var(--bg);color:var(--text);border-color:var(--border)}
.tab:hover:not(.active){color:var(--text)}
.panel{display:none;padding:20px 24px}.panel.active{display:block}
.toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
input[type=text],input[type=number],select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:var(--r);font-size:13px;outline:none}
input[type=text]:focus,input[type=number]:focus,select:focus{border-color:var(--accent)}
input[type=text]{flex:1;min-width:160px}
.table-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border);max-height:calc(100vh - 270px);overflow-y:auto}
table{width:100%;border-collapse:collapse}
thead th{background:var(--surface2);color:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:9px 10px;text-align:left;position:sticky;top:0;z-index:1;border-bottom:1px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:var(--surface2)}
td{padding:8px 10px;vertical-align:middle}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge.danger{background:rgba(240,82,82,.15);color:var(--danger)}
.badge.warning{background:rgba(245,158,11,.15);color:var(--warning)}
.badge.ok{background:rgba(16,185,129,.12);color:var(--ok)}
.badge.over{background:rgba(79,156,249,.12);color:var(--accent)}
.qty-ctrl{display:flex;align-items:center;gap:5px}
.qty-btn{width:26px;height:26px;border:1px solid var(--border);background:var(--surface2);color:var(--text);border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .1s}
.qty-btn:hover{background:var(--border)}
.qty-val{width:36px;text-align:center;font-weight:600;font-size:15px}
.editable-cell{cursor:pointer;padding:3px 6px;border-radius:4px;transition:background .15s}
.editable-cell:hover{background:var(--surface2)}
.edit-input{width:52px;padding:3px 6px;font-size:13px;border-radius:4px;text-align:center}
.prod-name{font-weight:500}.prod-fab{font-size:11px;color:var(--muted)}
.cat-chip{font-size:11px;color:var(--muted);background:var(--surface2);padding:2px 7px;border-radius:10px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{opacity:.88}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-ghost:hover{background:var(--border)}
.btn-danger{background:rgba(240,82,82,.12);color:var(--danger);border:1px solid rgba(240,82,82,.2)}.btn-danger:hover{background:rgba(240,82,82,.22)}
.btn-ok{background:rgba(16,185,129,.12);color:var(--ok);border:1px solid rgba(16,185,129,.2)}.btn-ok:hover{background:rgba(16,185,129,.22)}
.btn-accent{background:rgba(79,156,249,.12);color:var(--accent);border:1px solid rgba(79,156,249,.2)}.btn-accent:hover{background:rgba(79,156,249,.22)}
.btn-sm{padding:4px 9px;font-size:12px}
.btn-xs{padding:3px 7px;font-size:11px}
.compra-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.compra-item.critico{border-left:3px solid var(--danger)}
.compra-info h4{font-size:14px;font-weight:600;margin-bottom:4px}
.compra-meta{font-size:12px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap}
.compra-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.modal h3{margin-bottom:16px;font-size:16px}
.form-group{margin-bottom:12px}.form-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
.form-group input,.form-group select{width:100%}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.hist-item{background:var(--surface2);border-radius:6px;padding:10px 12px;margin-bottom:6px;font-size:13px}
.hist-item .hi-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.hist-item .hi-meta{font-size:11px;color:var(--muted)}
.cotacao-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px}
.cotacao-item h4{font-size:13px;font-weight:600;margin-bottom:8px}
.cotacao-result{font-size:13px;color:var(--muted);min-height:28px}
.cotacao-result.loading{color:var(--accent)}
.cotacao-result.found{color:var(--ok)}
.cotacao-result.notfound{color:var(--muted)}
.cotacao-preco{font-size:18px;font-weight:700;color:var(--ok)}
.lixeira-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px;opacity:.7}
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:16px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);padding:11px 16px;border-radius:var(--r);font-size:13px;z-index:200;opacity:0;transform:translateY(10px);transition:all .2s}
.toast.show{opacity:1;transform:translateY(0)}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.section-header h2{font-size:15px;font-weight:600}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:10px}
.ai-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:11px;background:rgba(79,156,249,.1);color:var(--accent);border:1px solid rgba(79,156,249,.2)}
</style>
</head>
<body>

<header>
  <div class="logo">Hansen <span>Estoque</span></div>
  <div class="stats">
    <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-label">Produtos</div></div>
    <div class="stat"><div class="stat-n danger" id="s-falta">0</div><div class="stat-label">Em falta</div></div>
    <div class="stat"><div class="stat-n ok" id="s-ok">0</div><div class="stat-label">OK</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--muted)" id="s-lixeira">0</div><div class="stat-label">Lixeira</div></div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('estoque')">📦 Estoque</div>
  <div class="tab" onclick="showTab('compras')">🛒 Compras</div>
  <div class="tab" onclick="showTab('cotacao')">💰 Cotação IA</div>
  <div class="tab" onclick="showTab('historico')">📋 Histórico</div>
  <div class="tab" onclick="showTab('lixeira')">🗑 Lixeira</div>
  <div class="tab" onclick="showTab('add')">➕ Novo</div>
</div>

<!-- ESTOQUE -->
<div id="panel-estoque" class="panel active">
  <div class="toolbar">
    <input type="text" id="search" placeholder="Buscar produto..." oninput="renderEstoque()">
    <select id="filtro-cat" onchange="renderEstoque()">
      <option value="">Todas as categorias</option>
      <option>Imobilizado</option>
      <option>Componentes Protéticos</option>
      <option>Material Cirúrgico</option>
    </select>
    <select id="filtro-status" onchange="renderEstoque()">
      <option value="">Todos os status</option>
      <option value="danger">Abaixo do mínimo</option>
      <option value="warning">No mínimo</option>
      <option value="ok">OK</option>
    </select>
    <button class="btn btn-ghost btn-sm" onclick="exportarCSV()">⬇ Excel</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>Produto</th><th>Cat.</th><th>Status</th><th>Qtd</th>
        <th title="Clique para editar">Mín ✏</th>
        <th title="Clique para editar">Ideal ✏</th>
        <th>Custo</th><th></th>
      </tr></thead>
      <tbody id="tbody-estoque"></tbody>
    </table>
  </div>
</div>

<!-- COMPRAS -->
<div id="panel-compras" class="panel">
  <div class="section-header">
    <h2>Itens para repor</h2>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-ghost btn-sm" onclick="copiarLista()">📋 Copiar lista</button>
      <button class="btn btn-ghost btn-sm" onclick="exportarCSVCompras()">⬇ Excel compras</button>
    </div>
  </div>
  <div id="compras-list"></div>
</div>

<!-- COTAÇÃO IA -->
<div id="panel-cotacao" class="panel">
  <div class="section-header">
    <h2>Cotação automática <span class="ai-chip">✨ IA + Web</span></h2>
    <button class="btn btn-primary" id="btn-cotar" onclick="iniciarCotacao()">🔍 Cotar lista de compras</button>
  </div>
  <div class="progress-bar" id="progress-bar" style="display:none"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div id="cotacao-status" style="font-size:13px;color:var(--muted);margin-bottom:12px"></div>
  <div id="cotacao-list"></div>
</div>

<!-- HISTÓRICO -->
<div id="panel-historico" class="panel">
  <div class="section-header">
    <h2>Histórico de entradas</h2>
    <button class="btn btn-ghost btn-sm" onclick="exportarCSVHistorico()">⬇ Excel histórico</button>
  </div>
  <div id="historico-list"></div>
</div>

<!-- LIXEIRA -->
<div id="panel-lixeira" class="panel">
  <div class="section-header">
    <h2>Lixeira</h2>
    <button class="btn btn-danger btn-sm" onclick="esvaziarLixeira()">🗑 Esvaziar</button>
  </div>
  <div id="lixeira-list"></div>
</div>

<!-- NOVO PRODUTO -->
<div id="panel-add" class="panel">
  <div style="max-width:460px">
    <h2 style="margin-bottom:18px;font-size:15px">Cadastrar produto</h2>
    <div class="form-group"><label>Nome *</label><input type="text" id="new-nome" placeholder="Ex: Luva Nitrila M"></div>
    <div class="form-group"><label>Categoria *</label>
      <select id="new-cat"><option>Imobilizado</option><option>Componentes Protéticos</option><option>Material Cirúrgico</option></select>
    </div>
    <div class="grid2">
      <div class="form-group"><label>Fabricante</label><input type="text" id="new-fab" placeholder="Ex: FGM"></div>
      <div class="form-group"><label>Custo médio (R$)</label><input type="number" id="new-custo" value="0" min="0" step="0.01"></div>
    </div>
    <div class="grid3">
      <div class="form-group"><label>Atual</label><input type="number" id="new-atual" value="0" min="0"></div>
      <div class="form-group"><label>Mínimo</label><input type="number" id="new-min" value="1" min="0"></div>
      <div class="form-group"><label>Ideal</label><input type="number" id="new-ideal" value="3" min="0"></div>
    </div>
    <button class="btn btn-primary" onclick="addProduto()">Salvar produto</button>
  </div>
</div>

<!-- MODAL REGISTRAR COMPRA -->
<div class="modal-bg" id="modal-compra">
  <div class="modal">
    <h3>📥 Registrar entrada</h3>
    <div id="modal-compra-nome" style="color:var(--muted);font-size:13px;margin-bottom:14px"></div>
    <div class="grid2">
      <div class="form-group"><label>Quantidade recebida *</label><input type="number" id="mc-qtd" value="1" min="1"></div>
      <div class="form-group"><label>Preço unit. pago (R$)</label><input type="number" id="mc-preco" value="0" min="0" step="0.01"></div>
    </div>
    <div class="form-group"><label>Fornecedor</label><input type="text" id="mc-forn" placeholder="Ex: Dental Cremer"></div>
    <div class="form-group"><label>Data</label><input type="date" id="mc-data"></div>
    <div class="form-group"><label>Observação</label><input type="text" id="mc-obs" placeholder="Opcional"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="fecharModal('modal-compra')">Cancelar</button>
      <button class="btn btn-primary" onclick="registrarCompra()">Confirmar entrada</button>
    </div>
  </div>
</div>

<!-- MODAL HISTÓRICO PRODUTO -->
<div class="modal-bg" id="modal-hist">
  <div class="modal" style="max-width:520px">
    <h3 id="modal-hist-title">Histórico</h3>
    <div id="modal-hist-content"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="fecharModal('modal-hist')">Fechar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ── DATA ──────────────────────────────────────────────────────────
function load() {
  const d = localStorage.getItem(KEY);
  if (d) {
    try { const o = JSON.parse(d); produtos = o.produtos || []; nextId = o.nextId || 300; }
    catch { initDefault(); }
  } else { initDefault(); }
  // migrate: ensure all fields
  produtos = produtos.map(p => ({
    deleted: false, deletedAt: null, compras: [], ...p
  }));
}
function initDefault() { produtos = DEFAULT.map(p => ({...p, deleted:false, deletedAt:null, compras:[]})); nextId=300; save(); }
function save() { localStorage.setItem(KEY, JSON.stringify({produtos, nextId})); }

// ── STATUS ────────────────────────────────────────────────────────
function getStatus(p) {
  if (p.estoqueMinimo === 0) return 'over';
  if (p.estoqueAtual < p.estoqueMinimo) return 'danger';
  if (p.estoqueAtual === p.estoqueMinimo) return 'warning';
  if (p.estoqueAtual >= p.estoqueIdeal) return 'over';
  return 'ok';
}
const STATUS_LABEL = {danger:'⚠ Abaixo', warning:'→ Mínimo', ok:'✓ OK', over:'↑ Acima'};

// ── TABS ──────────────────────────────────────────────────────────
function showTab(n) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelector(`[onclick="showTab('${n}')"]`).classList.add('active');
  document.getElementById('panel-'+n).classList.add('active');
  const renders = {estoque:renderEstoque, compras:renderCompras, historico:renderHistorico, lixeira:renderLixeira};
  if (renders[n]) renders[n]();
}

// ── STATS ─────────────────────────────────────────────────────────
function updateStats() {
  const ativos = produtos.filter(p=>!p.deleted);
  document.getElementById('s-total').textContent = ativos.length;
  document.getElementById('s-falta').textContent = ativos.filter(p=>getStatus(p)==='danger').length;
  document.getElementById('s-ok').textContent = ativos.filter(p=>['ok','over'].includes(getStatus(p))).length;
  document.getElementById('s-lixeira').textContent = produtos.filter(p=>p.deleted).length;
}

// ── ESTOQUE ───────────────────────────────────────────────────────
function renderEstoque() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('filtro-cat').value;
  const st = document.getElementById('filtro-status').value;
  let list = produtos.filter(p => !p.deleted &&
    (!q || p.produto.toLowerCase().includes(q) || (p.fabricante||'').toLowerCase().includes(q)) &&
    (!cat || p.categoria === cat) &&
    (!st || getStatus(p) === st)
  );
  const tbody = document.getElementById('tbody-estoque');
  tbody.innerHTML = list.map(p => {
    const s = getStatus(p);
    const custo = p.custoMedio > 0 ? 'R$ '+p.custoMedio.toFixed(2) : '—';
    return `<tr>
      <td><div class="prod-name">${p.produto}</div>${p.fabricante?`<div class="prod-fab">${p.fabricante}</div>`:''}</td>
      <td><span class="cat-chip" style="font-size:10px">${p.categoria.replace('Componentes Protéticos','Comp. Prot.').replace('Material Cirúrgico','Cirúrgico')}</span></td>
      <td><span class="badge ${s}">${STATUS_LABEL[s]}</span></td>
      <td><div class="qty-ctrl">
        <button class="qty-btn" onclick="ajustar(${p.id},-1)">−</button>
        <span class="qty-val">${p.estoqueAtual}</span>
        <button class="qty-btn" onclick="ajustar(${p.id},1)">+</button>
      </div></td>
      <td><span class="editable-cell" title="Clique para editar" onclick="editarCampo(this,${p.id},'estoqueMinimo')">${p.estoqueMinimo}</span></td>
      <td><span class="editable-cell" title="Clique para editar" onclick="editarCampo(this,${p.id},'estoqueIdeal')">${p.estoqueIdeal}</span></td>
      <td style="font-size:12px;color:var(--muted)">${custo}</td>
      <td style="white-space:nowrap">
        <button class="btn btn-accent btn-xs" onclick="abrirHistProduto(${p.id})" title="Histórico">📋</button>
        <button class="btn btn-ghost btn-xs" onclick="sugerirMarca(${p.id})" title="Sugerir marca IA">🤖</button>
        <button class="btn btn-danger btn-xs" onclick="moverLixeira(${p.id})" title="Excluir">🗑</button>
      </td>
    </tr>`;
  }).join('');
  if (!list.length) tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:36px;color:var(--muted)">Nenhum produto</td></tr>';
  updateStats();
}

function ajustar(id, d) {
  const p = produtos.find(x=>x.id===id); if(!p) return;
  p.estoqueAtual = Math.max(0, p.estoqueAtual + d);
  save(); renderEstoque();
}

function editarCampo(el, id, campo) {
  const p = produtos.find(x=>x.id===id); if(!p) return;
  const val = p[campo];
  const inp = document.createElement('input');
  inp.type='number'; inp.value=val; inp.min=0;
  inp.className='edit-input';
  el.replaceWith(inp); inp.focus(); inp.select();
  const commit = () => {
    const n = parseInt(inp.value)||0;
    p[campo] = n; save();
    const span = document.createElement('span');
    span.className='editable-cell'; span.title='Clique para editar';
    span.textContent=n;
    span.onclick=()=>editarCampo(span,id,campo);
    inp.replaceWith(span);
    updateStats();
  };
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e=>{if(e.key==='Enter')commit();if(e.key==='Escape'){inp.value=val;commit();}});
}

function moverLixeira(id) {
  const p = produtos.find(x=>x.id===id); if(!p) return;
  p.deleted=true; p.deletedAt=new Date().toISOString();
  save(); renderEstoque(); toast(`"${p.produto}" movido para lixeira`);
}

// ── COMPRAS ───────────────────────────────────────────────────────
function renderCompras() {
  const faltando = produtos.filter(p=>!p.deleted && getStatus(p)==='danger')
    .sort((a,b)=>{
      const ord = c => c==='Material Cirúrgico'?0:c==='Componentes Protéticos'?1:2;
      return ord(a.categoria)-ord(b.categoria)||a.produto.localeCompare(b.produto);
    });
  const el = document.getElementById('compras-list');
  if (!faltando.length) { el.innerHTML='<div class="empty"><div class="empty-icon">✅</div>Nenhum item abaixo do mínimo!</div>'; return; }
  el.innerHTML = faltando.map(p=>{
    const precisa = p.estoqueIdeal - p.estoqueAtual;
    const critico = p.estoqueAtual===0;
    const est = p.custoMedio>0?` · R$ ${(p.custoMedio*precisa).toFixed(2)} est.`:'';
    return `<div class="compra-item ${critico?'critico':''}">
      <div class="compra-info">
        <h4>${p.produto} ${critico?'<span style="color:var(--danger);font-size:11px;font-weight:400">ZERADO</span>':''}</h4>
        <div class="compra-meta">
          <span>Atual: <b>${p.estoqueAtual}</b></span>
          <span>Pedir: <b>${precisa} un</b></span>
          ${p.fabricante?`<span>🏭 ${p.fabricante}</span>`:''}
          <span class="cat-chip">${p.categoria}</span>
          ${est?`<span style="color:var(--ok)">${est}</span>`:''}
        </div>
      </div>
      <div class="compra-actions">
        <button class="btn btn-ok btn-sm" onclick="abrirModalCompra(${p.id})">📥 Registrar entrada</button>
      </div>
    </div>`;
  }).join('');
}

function abrirModalCompra(id) {
  produtoCompraAtual = id;
  const p = produtos.find(x=>x.id===id);
  document.getElementById('modal-compra-nome').textContent = p.produto;
  document.getElementById('mc-qtd').value = Math.max(1, p.estoqueIdeal - p.estoqueAtual);
  document.getElementById('mc-preco').value = p.custoMedio||0;
  document.getElementById('mc-forn').value = '';
  document.getElementById('mc-obs').value = '';
  document.getElementById('mc-data').value = new Date().toISOString().split('T')[0];
  document.getElementById('modal-compra').classList.add('open');
}

function registrarCompra() {
  const p = produtos.find(x=>x.id===produtoCompraAtual); if(!p) return;
  const qtd = parseInt(document.getElementById('mc-qtd').value)||0;
  const preco = parseFloat(document.getElementById('mc-preco').value)||0;
  const forn = document.getElementById('mc-forn').value.trim();
  const data = document.getElementById('mc-data').value;
  const obs = document.getElementById('mc-obs').value.trim();
  if (!qtd) { toast('Informe a quantidade'); return; }
  if (!p.compras) p.compras=[];
  p.compras.push({id:Date.now(), data, qtd, preco, fornecedor:forn, obs});
  p.estoqueAtual += qtd;
  if (preco>0) p.custoMedio = preco;
  save(); fecharModal('modal-compra'); renderCompras(); updateStats();
  toast(`+${qtd} unidades de "${p.produto}" ✓`);
}

function copiarLista() {
  const faltando = produtos.filter(p=>!p.deleted&&getStatus(p)==='danger');
  const txt = '🛒 Lista de Compras Hansen Odontologia\n'+new Date().toLocaleDateString('pt-BR')+'\n\n'+
    faltando.map(p=>`• ${p.produto} — pedir ${p.estoqueIdeal-p.estoqueAtual} un (atual: ${p.estoqueAtual})`).join('\n');
  navigator.clipboard.writeText(txt).then(()=>toast('Lista copiada ✓'));
}

// ── COTAÇÃO IA ────────────────────────────────────────────────────
let cotacaoAtiva = false;

async function iniciarCotacao() {
  if (cotacaoAtiva) return;
  const faltando = produtos.filter(p=>!p.deleted&&getStatus(p)==='danger');
  if (!faltando.length) { toast('Nenhum item para cotar'); return; }
  cotacaoAtiva = true;
  document.getElementById('btn-cotar').disabled = true;
  document.getElementById('btn-cotar').textContent = '⏳ Cotando...';
  document.getElementById('progress-bar').style.display='block';
  const list = document.getElementById('cotacao-list');
  // Render placeholders
  list.innerHTML = faltando.map(p=>`
    <div class="cotacao-item" id="cot-${p.id}">
      <h4>${p.produto} <span class="cat-chip">${p.categoria}</span></h4>
      <div class="cotacao-result loading" id="cot-res-${p.id}">⏳ Aguardando...</div>
    </div>`).join('');
  for (let i=0; i<faltando.length; i++) {
    const p = faltando[i];
    const pct = Math.round((i/faltando.length)*100);
    document.getElementById('progress-fill').style.width = pct+'%';
    document.getElementById('cotacao-status').textContent = `Cotando ${i+1}/${faltando.length}: ${p.produto}`;
    document.getElementById(`cot-res-${p.id}`).textContent = '🔍 Pesquisando...';
    try {
      const resultado = await cotarProduto(p.produto, p.fabricante);
      renderCotacaoResult(p.id, resultado);
    } catch(e) {
      document.getElementById(`cot-res-${p.id}`).className='cotacao-result notfound';
      document.getElementById(`cot-res-${p.id}`).textContent='⚠ Erro na busca';
    }
    await new Promise(r=>setTimeout(r,800));
  }
  document.getElementById('progress-fill').style.width='100%';
  document.getElementById('cotacao-status').textContent = `✓ Cotação concluída — ${faltando.length} itens pesquisados`;
  document.getElementById('btn-cotar').disabled=false;
  document.getElementById('btn-cotar').textContent='🔍 Cotar lista de compras';
  cotacaoAtiva=false;
}

async function cotarProduto(nome, fabricante) {
  const query = fabricante ? `${nome} ${fabricante}` : nome;
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:600,
      tools:[{type:'web_search_20250305',name:'web_search'}],
      system:'Você é um assistente de compras odontológicas. Pesquise o preço atual do produto em lojas brasileiras de material odontológico. Responda SOMENTE com JSON válido, sem markdown, sem explicações.',
      messages:[{role:'user',content:`Pesquise o preço atual de "${query}" em lojas de material odontológico no Brasil (dentalcremer.com.br, dentalspeed.com.br, lojadental.com.br, dentaloffice.com.br). Retorne APENAS este JSON: {"preco":NUMBER_OU_NULL,"loja":"NOME_DA_LOJA","url":"URL","encontrado":true_ou_false,"obs":"observação curta opcional"}`}]
    })
  });
  const data = await resp.json();
  // handle multi-turn if needed
  let messages = [{role:'user',content:`Pesquise o preço atual de "${query}" em lojas de material odontológico no Brasil (dentalcremer.com.br, dentalspeed.com.br, lojadental.com.br). Retorne APENAS este JSON: {"preco":NUMBER_OU_NULL,"loja":"NOME_DA_LOJA","url":"URL","encontrado":true_ou_false,"obs":"observação curta"}`}];
  let finalText = '';
  if (data.stop_reason === 'tool_use') {
    messages.push({role:'assistant',content:data.content});
    const toolResults = data.content.filter(b=>b.type==='tool_use').map(b=>({type:'tool_result',tool_use_id:b.id,content:'executed'}));
    messages.push({role:'user',content:toolResults});
    const resp2 = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:400,messages})
    });
    const data2 = await resp2.json();
    finalText = (data2.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
  } else {
    finalText = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
  }
  const clean = finalText.replace(/```json|```/g,'').trim();
  return JSON.parse(clean);
}

function renderCotacaoResult(id, r) {
  const el = document.getElementById(`cot-res-${id}`);
  if (!el) return;
  if (r.encontrado && r.preco) {
    el.className='cotacao-result found';
    const link = r.url ? `<a href="${r.url}" target="_blank" style="color:var(--accent);font-size:12px;margin-left:8px">🔗 Ver produto</a>` : '';
    el.innerHTML = `<span class="cotacao-preco">R$ ${Number(r.preco).toFixed(2)}</span> <span style="color:var(--muted);font-size:12px">— ${r.loja||'Loja dental'}</span>${link}${r.obs?`<br><span style="font-size:11px;color:var(--muted)">${r.obs}</span>`:''}`;
  } else {
    el.className='cotacao-result notfound';
    el.textContent = r.obs || '⚠ Não encontrado online';
  }
}

// ── MARCA IA ─────────────────────────────────────────────────────
async function sugerirMarca(id) {
  const p = produtos.find(x=>x.id===id); if(!p) return;
  toast(`🤖 Buscando marca para "${p.produto}"...`);
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:300,
        system:'Você é especialista em materiais odontológicos brasileiros. Responda SOMENTE em JSON.',
        messages:[{role:'user',content:`Para o material odontológico "${p.produto}", quais são as melhores marcas/fabricantes disponíveis no Brasil? Retorne APENAS: {"marcas":["marca1","marca2","marca3"],"recomendacao":"marca mais indicada","motivo":"motivo curto"}`}]
      })
    });
    const data = await resp.json();
    const txt = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const r = JSON.parse(txt.replace(/```json|```/g,'').trim());
    alert(`🏭 Marcas para "${p.produto}":\n\n${r.marcas.join(', ')}\n\n✅ Recomendada: ${r.recomendacao}\n💡 ${r.motivo}`);
  } catch(e) { toast('Erro ao buscar marca'); }
}

// ── HISTÓRICO ─────────────────────────────────────────────────────
function renderHistorico() {
  const todas = produtos.filter(p=>!p.deleted&&p.compras&&p.compras.length>0)
    .flatMap(p=>p.compras.map(c=>({...c,produto:p.produto,prodId:p.id})))
    .sort((a,b)=>new Date(b.data)-new Date(a.data));
  const el = document.getElementById('historico-list');
  if (!todas.length) { el.innerHTML='<div class="empty"><div class="empty-icon">📋</div>Nenhuma entrada registrada ainda.</div>'; return; }
  el.innerHTML = todas.map(c=>`
    <div class="hist-item">
      <div class="hi-top">
        <strong>${c.produto}</strong>
        <span style="color:var(--ok);font-weight:600">+${c.qtd} un</span>
      </div>
      <div class="hi-meta">
        📅 ${c.data} ${c.fornecedor?`· 🏪 ${c.fornecedor}`:''} ${c.preco>0?`· R$ ${c.preco.toFixed(2)}/un`:''}
        ${c.obs?`<br>💬 ${c.obs}`:''}
      </div>
    </div>`).join('');
}

function abrirHistProduto(id) {
  const p = produtos.find(x=>x.id===id); if(!p) return;
  document.getElementById('modal-hist-title').textContent = `📋 ${p.produto}`;
  const compras = (p.compras||[]).slice().reverse();
  const el = document.getElementById('modal-hist-content');
  if (!compras.length) { el.innerHTML='<div style="color:var(--muted);padding:16px 0">Nenhuma entrada registrada para este produto.</div>'; }
  else { el.innerHTML=compras.map(c=>`
    <div class="hist-item">
      <div class="hi-top"><span>+${c.qtd} unidades</span><span style="color:var(--muted);font-size:12px">${c.data}</span></div>
      <div class="hi-meta">${c.fornecedor?`🏪 ${c.fornecedor} `:''} ${c.preco>0?`· R$ ${c.preco.toFixed(2)}/un`:''} ${c.obs?`· ${c.obs}`:''}</div>
    </div>`).join('');}
  document.getElementById('modal-hist').classList.add('open');
}

// ── LIXEIRA ───────────────────────────────────────────────────────
function renderLixeira() {
  const del = produtos.filter(p=>p.deleted);
  const el = document.getElementById('lixeira-list');
  if (!del.length) { el.innerHTML='<div class="empty"><div class="empty-icon">🗑</div>Lixeira vazia.</div>'; return; }
  el.innerHTML = del.map(p=>`
    <div class="lixeira-item">
      <div>
        <div style="font-weight:600">${p.produto}</div>
        <div style="font-size:12px;color:var(--muted)">${p.categoria} · Excluído em ${new Date(p.deletedAt).toLocaleDateString('pt-BR')}</div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" onclick="restaurar(${p.id})">↩ Restaurar</button>
        <button class="btn btn-danger btn-sm" onclick="excluirPermanente(${p.id})">🗑 Excluir definitivo</button>
      </div>
    </div>`).join('');
}

function restaurar(id) {
  const p = produtos.find(x=>x.id===id); if(!p) return;
  p.deleted=false; p.deletedAt=null; save(); renderLixeira(); updateStats();
  toast(`"${p.produto}" restaurado ✓`);
}

function excluirPermanente(id) {
  if (!confirm('Excluir definitivamente? Não tem volta.')) return;
  produtos = produtos.filter(x=>x.id!==id); save(); renderLixeira(); updateStats();
}

function esvaziarLixeira() {
  const n = produtos.filter(p=>p.deleted).length;
  if (!n) return;
  if (!confirm(`Excluir ${n} itens permanentemente?`)) return;
  produtos = produtos.filter(p=>!p.deleted); save(); renderLixeira(); updateStats();
}

// ── NOVO PRODUTO ─────────────────────────────────────────────────
function addProduto() {
  const nome = document.getElementById('new-nome').value.trim();
  if (!nome) { toast('Informe o nome'); return; }
  const p = {
    id:nextId++, codigo:'', deleted:false, deletedAt:null, compras:[],
    categoria:document.getElementById('new-cat').value,
    produto:nome, un:'UN',
    estoqueMinimo:parseInt(document.getElementById('new-min').value)||0,
    estoqueIdeal:parseInt(document.getElementById('new-ideal').value)||0,
    estoqueAtual:parseInt(document.getElementById('new-atual').value)||0,
    custoMedio:parseFloat(document.getElementById('new-custo').value)||0,
    fabricante:document.getElementById('new-fab').value.trim()
  };
  produtos.push(p); save(); updateStats();
  document.getElementById('new-nome').value='';
  document.getElementById('new-fab').value='';
  document.getElementById('new-atual').value='0';
  document.getElementById('new-custo').value='0';
  toast(`"${p.produto}" cadastrado ✓`);
}

// ── EXPORT ────────────────────────────────────────────────────────
function gerarCSV(rows, headers) {
  const bom='\uFEFF';
  const csv=bom+[headers,...rows].map(r=>r.map(c=>`"${String(c??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  return a;
}

function exportarCSV() {
  const ativos = produtos.filter(p=>!p.deleted);
  const a = gerarCSV(
    ativos.map(p=>[p.produto,p.categoria,p.fabricante,p.estoqueAtual,p.estoqueMinimo,p.estoqueIdeal,p.custoMedio,STATUS_LABEL[getStatus(p)]]),
    ['Produto','Categoria','Fabricante','Estoque Atual','Mínimo','Ideal','Custo Médio','Status']
  );
  a.download='estoque-hansen.csv'; a.click();
}

function exportarCSVCompras() {
  const faltando = produtos.filter(p=>!p.deleted&&getStatus(p)==='danger');
  const a = gerarCSV(
    faltando.map(p=>[p.produto,p.categoria,p.fabricante,p.estoqueAtual,p.estoqueIdeal-p.estoqueAtual,p.custoMedio,(p.custoMedio*(p.estoqueIdeal-p.estoqueAtual)).toFixed(2)]),
    ['Produto','Categoria','Fabricante','Estoque Atual','Qtd a Pedir','Custo Unit.','Total Estimado']
  );
  a.download='compras-hansen.csv'; a.click();
}

function exportarCSVHistorico() {
  const linhas = produtos.filter(p=>!p.deleted&&p.compras?.length)
    .flatMap(p=>p.compras.map(c=>[p.produto,p.categoria,c.data,c.qtd,c.preco,c.fornecedor||'',c.obs||'']))
    .sort((a,b)=>new Date(b[2])-new Date(a[2]));
  const a = gerarCSV(linhas,['Produto','Categoria','Data','Qtd','Preço Unit.','Fornecedor','Obs']);
  a.download='historico-hansen.csv'; a.click();
}

// ── MODAL ─────────────────────────────────────────────────────────
function fecharModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-bg').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));

// ── TOAST ─────────────────────────────────────────────────────────
function toast(msg) {
  const el=document.getElementById('toast'); el.textContent=msg;
  el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2500);
}

// ── INIT ──────────────────────────────────────────────────────────
load(); renderEstoque(); updateStats();
</script>
